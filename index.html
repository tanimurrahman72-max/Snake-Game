<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>NEON SLITHER PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00ff88;--c:#00e5ff;--p:#ff0080;--y:#ffe600;--pu:#bf00ff;--o:#ff6a00;
  --bg:#03080d;--panel:rgba(0,12,24,0.97);--fh:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--fb);color:#dff8ff}
canvas{display:block}

/* ─── SCREENS ─── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 90% 75% at 50% 38%,rgba(0,28,48,.99) 0%,var(--bg) 100%);
  z-index:100;transition:opacity .38s}
.screen.hidden{opacity:0;pointer-events:none}
.screen::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none}

/* logo */
.logo{font-family:var(--fh);font-size:clamp(26px,6.5vw,66px);font-weight:900;letter-spacing:6px;
  background:linear-gradient(130deg,var(--c) 0%,var(--g) 50%,var(--p) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 24px rgba(0,229,255,.6));animation:logoPulse 3s ease-in-out infinite;z-index:1}
.logo-sub{font-family:var(--fb);font-size:11px;letter-spacing:8px;color:rgba(0,229,255,.5);
  margin-top:5px;z-index:1;text-transform:uppercase}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 18px rgba(0,229,255,.55))}
  50%{filter:drop-shadow(0 0 44px rgba(0,229,255,.95)) drop-shadow(0 0 80px rgba(0,255,136,.45))}}

/* buttons */
.btn{font-family:var(--fh);font-size:13px;letter-spacing:2px;padding:13px 36px;border-radius:5px;
  cursor:pointer;border:none;outline:none;text-transform:uppercase;z-index:1;
  transition:transform .12s,box-shadow .2s;position:relative;overflow:hidden}
.btn:active{transform:scale(.94)}
.btn-play{background:linear-gradient(135deg,var(--c),var(--g));color:#000;font-weight:900;
  box-shadow:0 0 26px rgba(0,229,255,.5),0 4px 20px rgba(0,0,0,.5)}
.btn-play:hover{box-shadow:0 0 42px rgba(0,229,255,.75),0 4px 20px rgba(0,0,0,.5)}
.btn-sec{background:transparent;color:var(--c);border:1.5px solid rgba(0,229,255,.45);
  box-shadow:0 0 10px rgba(0,229,255,.12)}
.btn-sec:hover{border-color:var(--c);box-shadow:0 0 22px rgba(0,229,255,.38)}
.btn-danger{background:linear-gradient(135deg,var(--p),var(--pu));color:#fff;font-weight:900;
  box-shadow:0 0 22px rgba(255,0,128,.45)}

/* panels */
.panel{background:var(--panel);border:1px solid rgba(0,229,255,.2);border-radius:12px;
  padding:18px;box-shadow:0 0 40px rgba(0,229,255,.06),inset 0 0 20px rgba(0,229,255,.02)}

/* tabs */
.tab-nav{display:flex;gap:4px;margin-bottom:14px}
.tab-btn{flex:1;padding:8px;border-radius:5px;cursor:pointer;font-family:var(--fh);
  font-size:9px;letter-spacing:1px;text-align:center;border:1px solid rgba(0,229,255,.1);
  background:transparent;color:rgba(255,255,255,.42);transition:all .2s}
.tab-btn.active{background:rgba(0,229,255,.1);color:var(--c);border-color:var(--c);
  box-shadow:0 0 10px rgba(0,229,255,.2)}

/* skins */
.skin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.skin-item{width:54px;height:54px;border-radius:10px;cursor:pointer;border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  transition:transform .18s,border-color .18s,box-shadow .18s;position:relative}
.skin-item:hover{transform:scale(1.1)}
.skin-item.selected{border-color:var(--c);box-shadow:0 0 16px var(--c)}

/* maps */
.map-card{background:rgba(0,0,0,.4);border:1.5px solid rgba(0,229,255,.1);border-radius:10px;
  padding:12px 16px;cursor:pointer;transition:border-color .2s,transform .2s;
  display:flex;align-items:center;gap:12px}
.map-card:hover{border-color:var(--c);transform:translateX(4px)}
.map-card.sel{border-color:var(--g);background:rgba(0,255,136,.04)}

/* leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;
  margin-bottom:4px;background:rgba(0,229,255,.025);border:1px solid rgba(0,229,255,.06)}

/* achievements */
.ach-item{display:flex;align-items:center;gap:10px;padding:9px;border-radius:8px;
  background:rgba(0,0,0,.26);border:1px solid rgba(255,255,255,.05);margin-bottom:5px}
.ach-item.done{border-color:var(--y)}

/* daily */
.reward-day{width:46px;height:56px;border-radius:8px;background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;font-size:10px;color:rgba(255,255,255,.42);font-family:var(--fh)}
.reward-day.claimed{border-color:var(--g);opacity:.5}
.reward-day.today{border-color:var(--y);box-shadow:0 0 16px var(--y);color:var(--y);
  animation:rPulse 1.5s ease-in-out infinite}
@keyframes rPulse{0%,100%{box-shadow:0 0 10px var(--y)}50%{box-shadow:0 0 28px var(--y),0 0 52px rgba(255,230,0,.3)}}

/* coin pill */
.coin-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,230,0,.07);
  border:1px solid rgba(255,230,0,.25);border-radius:20px;padding:4px 12px;
  font-family:var(--fh);font-size:12px;color:var(--y)}

/* toast */
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);white-space:nowrap;
  background:rgba(0,12,22,.97);border:1px solid var(--g);border-radius:8px;
  padding:9px 22px;font-family:var(--fh);font-size:11px;color:var(--g);
  letter-spacing:2px;z-index:600;box-shadow:0 0 20px rgba(0,255,136,.25);
  opacity:0;pointer-events:none;transition:opacity .3s}
#toast.show{opacity:1}

/* ─── HUD ─── */
#hud{position:fixed;top:0;left:0;right:0;display:none;align-items:center;
  justify-content:space-between;padding:9px 14px;
  background:linear-gradient(180deg,rgba(0,6,16,.9) 0%,transparent 100%);
  pointer-events:none;z-index:20}
.hud-b{display:flex;flex-direction:column;align-items:center}
.hud-l{font-family:var(--fh);font-size:7px;letter-spacing:2px;color:var(--c);opacity:.6}
.hud-v{font-family:var(--fh);font-size:17px;font-weight:900;color:#fff;text-shadow:0 0 10px var(--c)}
#sv{color:var(--g);text-shadow:0 0 12px var(--g)}
#cv{color:var(--y);text-shadow:0 0 12px var(--y)}
#rv{color:var(--p);text-shadow:0 0 12px var(--p)}

/* power-up bar */
#pub{position:fixed;top:56px;left:50%;transform:translateX(-50%);
  display:none;gap:7px;z-index:20;pointer-events:none}
.pu-icon{width:30px;height:30px;border-radius:7px;border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;
  font-size:14px;opacity:0;transition:opacity .3s,transform .25s}
.pu-icon.on{opacity:1;transform:scale(1.14);box-shadow:0 0 12px rgba(0,229,255,.45)}

/* minimap */
#minimap{position:fixed;top:56px;right:12px;width:78px;height:78px;border-radius:8px;
  border:1px solid rgba(0,229,255,.16);background:rgba(0,0,0,.5);z-index:20;display:none}

/* joystick */
#jzone{position:fixed;bottom:22px;left:22px;width:116px;height:116px;border-radius:50%;
  background:rgba(0,229,255,.05);border:1.5px solid rgba(0,229,255,.16);
  display:none;align-items:center;justify-content:center;z-index:30;touch-action:none}
#jknob{width:44px;height:44px;border-radius:50%;position:absolute;
  background:radial-gradient(circle at 35% 35%,rgba(0,229,255,.9),rgba(0,70,155,.8));
  border:2px solid var(--c);box-shadow:0 0 18px var(--c),inset 0 0 8px rgba(255,255,255,.3)}

/* boost */
#boost{position:fixed;bottom:22px;right:22px;width:66px;height:66px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,106,0,.84),rgba(155,30,0,.94));
  border:2px solid var(--o);box-shadow:0 0 20px var(--o);display:none;
  align-items:center;justify-content:center;font-size:26px;cursor:pointer;
  z-index:30;touch-action:none;user-select:none;transition:transform .1s}
#boost:active{transform:scale(.87)}
#boost.cd{opacity:.35}

/* ── PAUSE BUTTON (in-game) */
#pause-btn{position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border:1.5px solid rgba(0,229,255,.3);border-radius:8px;
  padding:5px 14px;font-family:var(--fh);font-size:10px;color:var(--c);letter-spacing:2px;
  cursor:pointer;z-index:25;display:none;transition:background .2s,border-color .2s}
#pause-btn:hover{background:rgba(0,229,255,.1);border-color:var(--c)}

/* ── MUSIC / SFX TOGGLES */
#sound-bar{position:fixed;top:10px;right:10px;display:none;gap:6px;z-index:25}
.snd-btn{background:rgba(0,0,0,.55);border:1.5px solid rgba(0,229,255,.25);border-radius:7px;
  padding:5px 10px;font-size:14px;cursor:pointer;transition:background .2s}
.snd-btn:hover{background:rgba(0,229,255,.12)}
.snd-btn.off{opacity:.35}

/* ad */
#admob{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(0,3,8,.94);
  border-top:1px solid rgba(0,229,255,.07);display:none;align-items:center;
  justify-content:center;font-size:10px;color:rgba(255,255,255,.16);letter-spacing:1px;z-index:10}

/* ── PAUSE SCREEN ── */
#s-pause{background:rgba(0,8,18,.82);backdrop-filter:blur(8px)}
#s-pause .logo{font-size:40px}

/* game over */
#go-score{font-family:var(--fh);font-size:50px;font-weight:900;color:var(--g);
  text-shadow:0 0 32px var(--g);margin:6px 0}

/* scrollable */
.scrollable{overflow-y:auto;max-height:55vh;padding-right:3px}
.scrollable::-webkit-scrollbar{width:2px}
.scrollable::-webkit-scrollbar-thumb{background:var(--c);border-radius:2px}

@media(max-width:480px){
  .logo{font-size:26px;letter-spacing:3px}.panel{padding:12px}.btn{font-size:11px;padding:11px 24px}
}
</style>
</head>
<body>

<!-- CANVAS -->
<canvas id="gc" style="position:fixed;inset:0;z-index:1"></canvas>
<canvas id="minimap"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-b"><div class="hud-l">SCORE</div><div class="hud-v" id="sv">0</div></div>
  <div class="hud-b"><div class="hud-l">RANK</div><div class="hud-v" id="rv">#1</div></div>
  <div class="hud-b"><div class="hud-l">COINS</div><div class="hud-v" id="cv">0</div></div>
</div>

<div id="pub">
  <div class="pu-icon" id="pu-speed">&#9889;</div>
  <div class="pu-icon" id="pu-shield">&#128737;</div>
  <div class="pu-icon" id="pu-magnet">&#129522;</div>
  <div class="pu-icon" id="pu-ghost">&#128123;</div>
</div>

<button id="pause-btn" onclick="togglePause()">&#10074;&#10074; PAUSE</button>

<div id="sound-bar">
  <button class="snd-btn" id="btn-music" onclick="toggleMusic()" title="Music">&#127925;</button>
  <button class="snd-btn" id="btn-sfx"   onclick="toggleSFX()"   title="SFX">&#128266;</button>
</div>

<div id="jzone"><div id="jknob"></div></div>
<button id="boost">&#9889;</button>
<div id="admob">AD SPACE &mdash; ADMOB BANNER 320&times;50</div>
<div id="toast"></div>

<!-- ══════════════ SCREENS ══════════════ -->

<!-- MENU -->
<div class="screen" id="s-menu">
  <canvas id="menu-bg" style="position:absolute;inset:0;z-index:0;pointer-events:none"></canvas>
  <div class="logo">NEON SLITHER</div>
  <div class="logo-sub">Snake Arena &bull; Ultra Pro</div>
  <div style="display:flex;flex-direction:column;gap:11px;margin-top:34px;width:255px;z-index:1">
    <button class="btn btn-play" id="btn-play">&#9654; PLAY NOW</button>
    <button class="btn btn-sec" onclick="go('s-skins')">&#127912; SKINS</button>
    <button class="btn btn-sec" onclick="go('s-maps')">&#128506; MAPS</button>
    <button class="btn btn-sec" onclick="go('s-lb')">&#127942; LEADERBOARD</button>
    <button class="btn btn-sec" onclick="go('s-daily')">&#127873; DAILY REWARD</button>
    <button class="btn btn-sec" onclick="go('s-ach')">&#127894; ACHIEVEMENTS</button>
  </div>
  <div style="margin-top:18px;z-index:1"><div class="coin-pill">&#129689; <span id="m-coins">0</span> COINS</div></div>
  <div style="margin-top:12px;z-index:1;display:flex;gap:10px">
    <button class="snd-btn" id="menu-music" onclick="toggleMusic()" title="Music">&#127925;</button>
    <button class="snd-btn" id="menu-sfx"   onclick="toggleSFX()"   title="SFX">&#128266;</button>
  </div>
</div>

<!-- SKINS -->
<div class="screen hidden" id="s-skins">
  <div style="width:min(460px,93vw);z-index:1">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button class="btn btn-sec" style="padding:7px 14px" onclick="go('s-menu')">&larr; BACK</button>
      <span style="font-family:var(--fh);font-size:14px;font-weight:900">SNAKE SKINS</span>
      <div class="coin-pill" style="margin-left:auto">&#129689; <span id="sk-coins">0</span></div>
    </div>
    <div class="panel">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="skinTab('free',this)">FREE</button>
        <button class="tab-btn" onclick="skinTab('premium',this)">PREMIUM</button>
        <button class="tab-btn" onclick="skinTab('special',this)">SPECIAL</button>
      </div>
      <div id="sg-free" class="skin-grid"></div>
      <div id="sg-premium" class="skin-grid" style="display:none"></div>
      <div id="sg-special" class="skin-grid" style="display:none"></div>
    </div>
    <div style="margin-top:12px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,.32);margin-bottom:6px">PREVIEW</div>
      <canvas id="skin-prev" width="210" height="58" style="border-radius:8px;background:rgba(0,0,0,.4)"></canvas>
    </div>
    <button class="btn btn-play" style="width:100%;margin-top:10px" onclick="applySkin()">EQUIP SKIN</button>
  </div>
</div>

<!-- MAPS -->
<div class="screen hidden" id="s-maps">
  <div style="width:min(460px,93vw);z-index:1">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button class="btn btn-sec" style="padding:7px 14px" onclick="go('s-menu')">&larr; BACK</button>
      <span style="font-family:var(--fh);font-size:14px;font-weight:900">SELECT MAP</span>
    </div>
    <div id="map-list" style="display:flex;flex-direction:column;gap:9px"></div>
    <button class="btn btn-play" style="width:100%;margin-top:14px" onclick="applyMap()">SELECT MAP</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="screen hidden" id="s-lb">
  <div style="width:min(460px,93vw);z-index:1">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button class="btn btn-sec" style="padding:7px 14px" onclick="go('s-menu')">&larr; BACK</button>
      <span style="font-family:var(--fh);font-size:14px;font-weight:900">LEADERBOARD</span>
    </div>
    <div class="panel">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="lbTab(this)">DAILY</button>
        <button class="tab-btn" onclick="lbTab(this)">WEEKLY</button>
        <button class="tab-btn" onclick="lbTab(this)">ALL TIME</button>
      </div>
      <div id="lb-list" class="scrollable"></div>
    </div>
  </div>
</div>

<!-- DAILY -->
<div class="screen hidden" id="s-daily">
  <div style="width:min(460px,93vw);z-index:1;text-align:center">
    <div style="font-family:var(--fh);font-size:18px;font-weight:900;margin-bottom:4px">DAILY REWARDS</div>
    <div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:22px">Login daily for bigger rewards!</div>
    <div id="rw-grid" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"></div>
    <button class="btn btn-play" style="margin-top:22px;min-width:190px" id="claim-btn" onclick="claimDaily()">CLAIM REWARD</button><br>
    <button class="btn btn-sec" style="margin-top:9px;min-width:190px" onclick="go('s-menu')">BACK</button>
  </div>
</div>

<!-- ACHIEVEMENTS -->
<div class="screen hidden" id="s-ach">
  <div style="width:min(460px,93vw);z-index:1">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button class="btn btn-sec" style="padding:7px 14px" onclick="go('s-menu')">&larr; BACK</button>
      <span style="font-family:var(--fh);font-size:14px;font-weight:900">ACHIEVEMENTS</span>
    </div>
    <div class="panel scrollable" id="ach-list"></div>
  </div>
</div>

<!-- PAUSE SCREEN -->
<div class="screen hidden" id="s-pause">
  <div class="logo" style="font-size:clamp(22px,5vw,46px)">&#10074;&#10074; PAUSED</div>
  <div style="display:flex;flex-direction:column;gap:11px;margin-top:30px;width:250px;z-index:1">
    <button class="btn btn-play" onclick="togglePause()">&#9654; RESUME</button>
    <button class="btn btn-sec"  onclick="restartFromPause()">&#8635; RESTART</button>
    <button class="btn btn-sec"  onclick="go('s-menu');stopGame()">&#127968; MAIN MENU</button>
  </div>
  <div style="display:flex;gap:14px;margin-top:20px;z-index:1">
    <button class="snd-btn" id="pause-music" onclick="toggleMusic()">&#127925;</button>
    <button class="snd-btn" id="pause-sfx"   onclick="toggleSFX()">&#128266;</button>
  </div>
  <div style="margin-top:12px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;z-index:1">PRESS ESC OR P TO RESUME</div>
</div>

<!-- GAME OVER -->
<div class="screen hidden" id="s-go">
  <div style="text-align:center;z-index:1">
    <div style="font-family:var(--fh);font-size:12px;letter-spacing:4px;color:var(--p);margin-bottom:6px">GAME OVER</div>
    <div id="go-score">0</div>
    <div id="go-best" style="font-size:12px;color:rgba(255,255,255,.42);letter-spacing:2px">BEST: 0</div>
    <div style="margin-top:7px" class="coin-pill">+<span id="go-coins">0</span> &#129689; EARNED</div>
    <div style="display:flex;flex-direction:column;gap:9px;margin-top:26px;width:235px">
      <button class="btn btn-play" id="btn-retry">&#9654; PLAY AGAIN</button>
      <button class="btn btn-sec"  onclick="go('s-lb')">&#127942; LEADERBOARD</button>
      <button class="btn btn-sec"  onclick="go('s-menu')">&#127968; MENU</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
const LS=k=>localStorage.getItem(k);
const SS=(k,v)=>localStorage.setItem(k,v);
const ST={
  coins:+(LS('ns_coins')||250), best:+(LS('ns_best')||0),
  skin:+(LS('ns_skin')||0),     map:+(LS('ns_map')||0),
  owned:JSON.parse(LS('ns_owned')||'[0,1,2,3]'),
  dday:+(LS('ns_dday')||0),
  ach:JSON.parse(LS('ns_ach')||'{}'),
  musicOn: LS('ns_music')!=='0',
  sfxOn:   LS('ns_sfx')  !=='0',
};
const save=()=>{
  SS('ns_coins',ST.coins);SS('ns_best',ST.best);SS('ns_skin',ST.skin);SS('ns_map',ST.map);
  SS('ns_owned',JSON.stringify(ST.owned));SS('ns_ach',JSON.stringify(ST.ach));
  SS('ns_music',ST.musicOn?'1':'0');SS('ns_sfx',ST.sfxOn?'1':'0');
};

// ══════════════════════════════════════════════════════════════════
//  WEB AUDIO ENGINE — 100% SYNTHESISED, ZERO COPYRIGHT
// ══════════════════════════════════════════════════════════════════
let AC=null;
function getAC(){
  if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}

// ── MUSIC (procedural chiptune loop) ──────────────────────────────
let musicNodes=[], musicPlaying=false, musicStart=0;

// Pentatonic bassline notes (Hz)
const BASS=[65.41,73.42,82.41,98.00,110.00,130.81,146.83,164.81];
const LEAD=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
const ARP =[523.25,659.25,783.99,1046.5,783.99,659.25,523.25,392.00];

function startMusic(){
  if(musicPlaying||!ST.musicOn)return;
  try{
    const ac=getAC();
    musicPlaying=true;
    musicStart=ac.currentTime;

    const masterGain=ac.createGain(); masterGain.gain.value=0.18; masterGain.connect(ac.destination);

    // Low-pass filter for warmth
    const lpf=ac.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2200;
    lpf.connect(masterGain);

    const compressor=ac.createDynamicsCompressor();
    compressor.threshold.value=-18; compressor.connect(lpf);

    const BPM=128, beatLen=60/BPM, barLen=beatLen*4;
    const now=ac.currentTime;

    function scheduleLoop(loopStart){
      if(!musicPlaying)return;
      const loopNodes=[];

      // ── BASS (square wave) ──
      BASS.forEach((freq,i)=>{
        const t=loopStart + i*beatLen*0.5;
        const osc=ac.createOscillator(); osc.type='square'; osc.frequency.value=freq;
        const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.22,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+beatLen*0.45);
        osc.connect(g); g.connect(compressor);
        osc.start(t); osc.stop(t+beatLen*0.5);
        loopNodes.push(osc,g);
      });

      // ── LEAD MELODY (sine + detune) ──
      const melody=[0,2,4,7, 9,7,4,2, 0,4,7,9, 11,9,7,4];
      melody.forEach((deg,i)=>{
        const freq=LEAD[deg%LEAD.length]*((i>7)?2:1);
        const t=loopStart+i*beatLen*0.5;
        const osc=ac.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
        osc.detune.value=(Math.random()-.5)*8;
        const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.15,t+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,t+beatLen*0.45);
        osc.connect(g); g.connect(compressor);
        osc.start(t); osc.stop(t+beatLen*0.5);
        loopNodes.push(osc,g);
      });

      // ── ARP (triangle, fast 16th notes) ──
      for(let i=0;i<32;i++){
        const t=loopStart+i*beatLen*0.25;
        const freq=ARP[i%ARP.length];
        const osc=ac.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
        const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.06,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+beatLen*0.22);
        osc.connect(g); g.connect(compressor);
        osc.start(t); osc.stop(t+beatLen*0.25);
        loopNodes.push(osc,g);
      }

      // ── KICK (sine burst) ──
      [0,1.5,2,3,3.5].forEach(beat=>{
        const t=loopStart+beat*beatLen;
        const osc=ac.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(150,t);
        osc.frequency.exponentialRampToValueAtTime(40,t+0.08);
        const g=ac.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
        osc.connect(g); g.connect(compressor);
        osc.start(t); osc.stop(t+0.15);
        loopNodes.push(osc,g);
      });

      // ── HI-HAT (noise) ──
      for(let i=0;i<16;i++){
        const t=loopStart+i*beatLen*0.5;
        const buf=ac.createBuffer(1,ac.sampleRate*0.04,ac.sampleRate);
        const d=buf.getChannelData(0);
        for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*.6;
        const src=ac.createBufferSource(); src.buffer=buf;
        const hpf=ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=7000;
        const g=ac.createGain(); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
        src.connect(hpf); hpf.connect(g); g.connect(compressor);
        src.start(t); loopNodes.push(src,hpf,g);
      }

      musicNodes=loopNodes;
      // schedule next loop
      const nextLoopStart=loopStart+barLen*4;
      const delay=(nextLoopStart-ac.currentTime)*1000-100;
      setTimeout(()=>scheduleLoop(nextLoopStart), Math.max(0,delay));
    }

    scheduleLoop(now);
  }catch(e){console.warn('Audio err:',e);}
}

function stopMusic(){
  musicPlaying=false;
  musicNodes.forEach(n=>{try{n.stop?n.stop():n.disconnect();}catch(e){}});
  musicNodes=[];
}

// ── SFX ───────────────────────────────────────────────────────────
function sfx(type){
  if(!ST.sfxOn)return;
  try{
    const ac=getAC();
    const g=ac.createGain(); g.connect(ac.destination);
    const now=ac.currentTime;

    if(type==='eat'){
      // bright tick
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=880;
      o.frequency.exponentialRampToValueAtTime(1200,now+0.05);
      g.gain.setValueAtTime(0.22,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.connect(g); o.start(now); o.stop(now+0.1);
    }
    else if(type==='coin'){
      // sparkling coin
      [660,880,1100,1320].forEach((f,i)=>{
        const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
        const gg=ac.createGain(); gg.gain.setValueAtTime(0,now+i*.03);
        gg.gain.linearRampToValueAtTime(0.18,now+i*.03+0.02);
        gg.gain.exponentialRampToValueAtTime(0.001,now+i*.03+0.12);
        o.connect(gg); gg.connect(ac.destination);
        o.start(now+i*.03); o.stop(now+i*.03+0.15);
      });
    }
    else if(type==='powerup'){
      // rising sweep
      const o=ac.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(220,now);
      o.frequency.exponentialRampToValueAtTime(1760,now+0.3);
      const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800;
      g.gain.setValueAtTime(0.28,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
      o.connect(f); f.connect(g); o.start(now); o.stop(now+0.38);
    }
    else if(type==='kill'){
      // explosion burst
      const buf=ac.createBuffer(1,ac.sampleRate*.3,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*.08));
      const src=ac.createBufferSource(); src.buffer=buf;
      const dist=ac.createWaveShaper();
      const curve=new Float32Array(256);
      for(let i=0;i<256;i++) curve[i]=Math.tanh((i/128-1)*4);
      dist.curve=curve;
      const lpf=ac.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=400;
      g.gain.setValueAtTime(0.5,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      src.connect(dist); dist.connect(lpf); lpf.connect(g); src.start(now);
    }
    else if(type==='boost'){
      // engine rev
      const o=ac.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(80,now);
      o.frequency.linearRampToValueAtTime(200,now+0.25);
      const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600;
      g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      o.connect(f); f.connect(g); o.start(now); o.stop(now+0.3);
    }
    else if(type==='die'){
      // descending whine
      const o=ac.createOscillator(); o.type='sawtooth';
      o.frequency.setValueAtTime(600,now);
      o.frequency.exponentialRampToValueAtTime(40,now+0.8);
      const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200;
      g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.85);
      o.connect(f); f.connect(g); o.start(now); o.stop(now+0.9);
    }
    else if(type==='ui'){
      // soft click
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=440;
      g.gain.setValueAtTime(0.14,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.05);
      o.connect(g); o.start(now); o.stop(now+0.06);
    }
    else if(type==='pause'){
      [440,550].forEach((f,i)=>{
        const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
        const gg=ac.createGain(); gg.gain.setValueAtTime(0.18,now+i*.06);
        gg.gain.exponentialRampToValueAtTime(0.001,now+i*.06+0.1);
        o.connect(gg); gg.connect(ac.destination); o.start(now+i*.06); o.stop(now+i*.06+0.12);
      });
    }
    else if(type==='resume'){
      [550,440].forEach((f,i)=>{
        const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
        const gg=ac.createGain(); gg.gain.setValueAtTime(0.18,now+i*.06);
        gg.gain.exponentialRampToValueAtTime(0.001,now+i*.06+0.1);
        o.connect(gg); gg.connect(ac.destination); o.start(now+i*.06); o.stop(now+i*.06+0.12);
      });
    }
    else if(type==='achieve'){
      [523,659,784,1047].forEach((f,i)=>{
        const o=ac.createOscillator(); o.type='triangle'; o.frequency.value=f;
        const gg=ac.createGain(); gg.gain.setValueAtTime(0,now+i*.07);
        gg.gain.linearRampToValueAtTime(0.2,now+i*.07+0.03);
        gg.gain.exponentialRampToValueAtTime(0.001,now+i*.07+0.15);
        o.connect(gg); gg.connect(ac.destination); o.start(now+i*.07); o.stop(now+i*.07+0.18);
      });
    }
  }catch(e){}
}

// ── MENU BG ANIMATION ─────────────────────────────────────────────
let menuRAF;
function menuAnim(){
  cancelAnimationFrame(menuRAF);
  const c=document.getElementById('menu-bg');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const snakes=Array.from({length:5},(_,i)=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    a:Math.random()*Math.PI*2,spd:1+Math.random()*1.5,len:18+~~(Math.random()*22),
    col:['#00ff88','#00e5ff','#ff0080','#ffe600','#bf00ff'][i],hist:[],
  }));
  function frame(){
    const sm=document.getElementById('s-menu');
    if(!sm||sm.classList.contains('hidden')){ctx.clearRect(0,0,c.width,c.height);return;}
    ctx.clearRect(0,0,c.width,c.height);
    snakes.forEach(s=>{
      s.a+=(Math.random()-.5)*.1;
      s.x+=Math.cos(s.a)*s.spd; s.y+=Math.sin(s.a)*s.spd;
      if(s.x<0)s.x=c.width;if(s.x>c.width)s.x=0;
      if(s.y<0)s.y=c.height;if(s.y>c.height)s.y=0;
      s.hist.unshift({x:s.x,y:s.y});
      if(s.hist.length>s.len*3)s.hist.pop();
      s.hist.forEach((p,i)=>{
        const r=6*(1-i/s.hist.length);
        const al=Math.floor(190*(1-i/s.hist.length)).toString(16).padStart(2,'0');
        ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
        ctx.fillStyle=s.col+al; ctx.shadowBlur=10; ctx.shadowColor=s.col; ctx.fill();
      });
      ctx.shadowBlur=0;
    });
    menuRAF=requestAnimationFrame(frame);
  }
  frame();
}

  ST.skin=sk.id;
  document.querySelectorAll('.skin-item').forEach(i=>i.classList.remove('selected'));

function drawSkinPrev(){
  const c=document.getElementById('skin-prev'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,210,58);
  const sk=ALL_SKINS.find(s=>s.id===ST.skin)||SKINS.free[0];
  for(let i=0;i<9;i++){
    const x=14+i*21,y=29,r=i===0?12:9;
    const gr=ctx.createRadialGradient(x,y,0,x,y,r);
    gr.addColorStop(0,sk.c[0]); gr.addColorStop(1,sk.c[sk.c.length-1]);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.shadowBlur=12; ctx.shadowColor=sk.c[0]; ctx.fill();
  }
  ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.font='bold 9px Orbitron,monospace';
  ctx.textAlign='right'; ctx.fillText(sk.name.toUpperCase(),200,50);
}

}

function track(field,val){

    toast('&#127942; '+a.name.toUpperCase()+'!','#ffe600'); sfx('achieve');

}

// ══════════════════════════════════════════════════════════════════
//  GAME ENGINE
// ══════════════════════════════════════════════════════════════════
const GC=document.getElementById('gc');
const gx=GC.getContext('2d');
const MM=document.getElementById('minimap');
const mx=MM.getContext('2d');
const WW=3200,WH=3200;
let G=null,RAF=null,lastT=0,PAUSED=false;

function rnd(a,b){return a+~~(Math.random()*(b-a));}

function mkSnake(x,y,cols,len,isPlayer,name){
  name=name||'';
  const segs=[];
  for(let i=0;i<len*3+6;i++)segs.push({x:x-i*8,y});
  return {x,y,angle:0,targetAngle:0,cols,segs,maxLen:len,isPlayer,name,dead:false,aiCD:0};
}

function spawnFood(){if(!G)return;G.food.push({x:rnd(60,WW-60),y:rnd(60,WH-60),r:4+Math.random()*4,col:FOOD_COLORS[~~(Math.random()*FOOD_COLORS.length)],bob:Math.random()*Math.PI*2});}
function spawnCoin(){if(!G)return;G.coins.push({x:rnd(80,WW-80),y:rnd(80,WH-80),bob:Math.random()*Math.PI*2});}
function spawnPU(){if(!G)return;const pu=PU_DEFS[~~(Math.random()*PU_DEFS.length)];G.pups.push({x:rnd(120,WW-120),y:rnd(120,WH-120),...pu,bob:Math.random()*Math.PI*2,rot:0});}
function spawnFoodAt(x,y){if(!G)return;G.food.push({x,y,r:4+Math.random()*4,col:FOOD_COLORS[~~(Math.random()*FOOD_COLORS.length)],bob:0});}

// ── PAUSE ──────────────────────────────────────────────────────────
function togglePause(){
  if(!G||G.dead)return;
  PAUSED=!PAUSED;
  if(PAUSED){
    sfx('pause');
    cancelAnimationFrame(RAF);
    go('s-pause');
    document.getElementById('pause-btn').textContent='&#9654; RESUME';
    if(ST.musicOn)stopMusic();
  } else {
    sfx('resume');
    go('__none__');
    document.getElementById('pause-btn').textContent='&#10074;&#10074; PAUSE';
    if(ST.musicOn)startMusic();
    lastT=performance.now();
    RAF=requestAnimationFrame(loop);
  }
}

function restartFromPause(){
  sfx('ui'); PAUSED=false; stopMusic();
  go('__none__');
  setTimeout(startGame,100);
}

function stopGame(){
  cancelAnimationFrame(RAF); PAUSED=false;
  stopMusic(); G=null;
  hideGameOverlays();
}
function hideGameOverlays(){
  document.getElementById('hud').style.display='none';
  document.getElementById('pub').style.display='none';
  MM.style.display='none';
  document.getElementById('jzone').style.display='none';
  document.getElementById('boost').style.display='none';
  document.getElementById('admob').style.display='none';
  document.getElementById('pause-btn').style.display='none';
  document.getElementById('sound-bar').style.display='none';
}

// ── START GAME ─────────────────────────────────────────────────────
function startGame(){
  cancelAnimationFrame(RAF); PAUSED=false; G=null; stopMusic();
  getAC(); // unlock AudioContext on user gesture

  GC.width=window.innerWidth; GC.height=window.innerHeight-48;
  MM.width=MM.height=78;
  go('__none__');

  document.getElementById('hud').style.display='flex';
  document.getElementById('pub').style.display='flex';
  MM.style.display='block';
  document.getElementById('jzone').style.display='flex';
  document.getElementById('boost').style.display='flex';
  document.getElementById('admob').style.display='flex';
  document.getElementById('pause-btn').style.display='block';
  document.getElementById('sound-bar').style.display='flex';
  document.getElementById('pause-btn').textContent='&#10074;&#10074; PAUSE';
  updateSndIcons();

  const sk=ALL_SKINS.find(s=>s.id===ST.skin)||SKINS.free[0];
  const mp=MAPS[ST.map];

  G={
    map:mp, score:0, gameTime:0,
    cam:{x:WW/2-GC.width/2, y:WH/2-GC.height/2},
    food:[], coins:[], pups:[], particles:[],
    player:mkSnake(WW/2,WH/2,sk.c,12,true,'YOU'),
    aiSnakes:[], puActive:{},
    boostActive:false, boostCD:0, dead:false,
    keys:{}, mouse:{x:0,y:0,down:false},
    joy:{dx:0,dy:0,on:false},
  };

  for(let i=0;i<8;i++){
    const s2=ALL_SKINS[~~(Math.random()*ALL_SKINS.length)];
    G.aiSnakes.push(mkSnake(rnd(300,WW-300),rnd(300,WH-300),s2.c,rnd(6,16),false,AI_NAMES[i%AI_NAMES.length]));
  }

  for(let i=0;i<280;i++)spawnFood();
  for(let i=0;i<28;i++)spawnCoin();
  for(let i=0;i<6;i++)spawnPU();

  setupInput();
  ST.ach.games=(ST.ach.games||0)+1; track('games',ST.ach.games);

  if(LS('ns_dcl')!==new Date().toDateString())
    setTimeout(()=>toast('&#127873; DAILY REWARD AVAILABLE!','#ffe600'),900);

  startMusic();
  lastT=performance.now();
  RAF=requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────────────
function setupInput(){
  const kd=e=>{
    if(!G)return;
    G.keys[e.key]=true;
    if(e.key==='Escape'||e.key==='p'||e.key==='P') togglePause();
  };
  const ku=e=>{if(G)G.keys[e.key]=false;};
  document.addEventListener('keydown',kd);
  document.addEventListener('keyup',ku);

  GC.addEventListener('mousemove',e=>{
    if(!G||PAUSED)return;
    const r=GC.getBoundingClientRect(); G.mouse.x=e.clientX-r.left; G.mouse.y=e.clientY-r.top;
  });
  GC.addEventListener('mousedown',()=>{if(G&&!PAUSED)G.mouse.down=true;});
  GC.addEventListener('mouseup',()=>{if(G)G.mouse.down=false;});
  GC.addEventListener('touchmove',e=>{
    if(!G||PAUSED)return;
    const r=GC.getBoundingClientRect(),t=e.touches[0];
    G.mouse.x=t.clientX-r.left; G.mouse.y=t.clientY-r.top; G.mouse.down=true; e.preventDefault();
  },{passive:false});
  GC.addEventListener('touchend',()=>{if(G)G.mouse.down=false;});

  // joystick
  const jz=document.getElementById('jzone'),jk=document.getElementById('jknob');
  let jox,joy2,ja=false; const R=42;
  const js=e=>{if(PAUSED)return;const t=e.touches?e.touches[0]:e;jox=t.clientX;joy2=t.clientY;ja=true;if(G)G.joy.on=true;e.preventDefault();};
  const jm=e=>{
    if(!ja||PAUSED)return;const t=e.touches?e.touches[0]:e;
    let dx=t.clientX-jox,dy=t.clientY-joy2;
    const d=Math.hypot(dx,dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}
    jk.style.transform='translate('+dx+'px,'+dy+'px)';
    if(G){G.joy.dx=dx;G.joy.dy=dy;}e.preventDefault();
  };
  const je=()=>{ja=false;jk.style.transform='translate(0,0)';if(G){G.joy.on=false;G.joy.dx=0;G.joy.dy=0;}};
  jz.addEventListener('touchstart',js,{passive:false}); jz.addEventListener('touchmove',jm,{passive:false}); jz.addEventListener('touchend',je,{passive:false});
  jz.addEventListener('mousedown',js); document.addEventListener('mousemove',jm); document.addEventListener('mouseup',je);

  // boost
  const bb=document.getElementById('boost');
  const doBoost=()=>{
    if(!G||G.boostCD>0||PAUSED)return;
    G.boostActive=true; G.boostCD=5000; bb.classList.add('cd'); sfx('boost');
    setTimeout(()=>{if(G)G.boostActive=false;},2500);
    setTimeout(()=>bb.classList.remove('cd'),5000);
  };
  bb.addEventListener('touchstart',e=>{e.preventDefault();doBoost();},{passive:false});
  bb.addEventListener('mousedown',doBoost);
}

// ── MAIN LOOP ──────────────────────────────────────────────────────
function loop(ts){
  if(!G||G.dead||PAUSED)return;
  const dt=Math.min(ts-lastT,50); lastT=ts;
  update(dt); render();
  RAF=requestAnimationFrame(loop);
}

// ── UPDATE ─────────────────────────────────────────────────────────
function update(dt){
  G.gameTime+=dt/1000;
  G.boostCD=Math.max(0,G.boostCD-dt);

  Object.keys(G.puActive).forEach(k=>{
    G.puActive[k]-=dt;
    if(G.puActive[k]<=0){delete G.puActive[k];setPUIco(k,false);}
  });

  let spd=3.0;
  if(G.boostActive)spd=5.5;
  if(G.puActive.speed)spd*=1.5;

  const p=G.player;
  if(G.joy.on&&(Math.abs(G.joy.dx)>8||Math.abs(G.joy.dy)>8)){
    p.targetAngle=Math.atan2(G.joy.dy,G.joy.dx);
  } else if(G.mouse.down&&G.mouse.x>160){
    p.targetAngle=Math.atan2(G.cam.y+G.mouse.y-p.y, G.cam.x+G.mouse.x-p.x);
  } else {
    const k=G.keys;
    if(k['ArrowLeft']||k['a']||k['A'])p.targetAngle=Math.PI;
    else if(k['ArrowRight']||k['d']||k['D'])p.targetAngle=0;
    else if(k['ArrowUp']||k['w']||k['W'])p.targetAngle=-Math.PI/2;
    else if(k['ArrowDown']||k['s']||k['S'])p.targetAngle=Math.PI/2;
  }

  moveSnake(p,spd);

  G.aiSnakes.forEach(ai=>{
    if(ai.dead)return;
    ai.aiCD-=dt; if(ai.aiCD<=0){thinkAI(ai);ai.aiCD=250+Math.random()*350;}
    moveSnake(ai,2.4);
    if(ai.x<25||ai.x>WW-25||ai.y<25||ai.y>WH-25)killAI(ai);
  });

  if(p.x<25||p.x>WW-25||p.y<25||p.y>WH-25){
    if(!G.puActive.shield&&!G.puActive.ghost){killPlayer();return;}
  }

  if(!G.puActive.shield&&!G.puActive.ghost){
    for(const ai of G.aiSnakes){
      if(ai.dead)continue;
      for(let i=4;i<ai.segs.length;i+=2){
        if(Math.hypot(p.x-ai.segs[i].x,p.y-ai.segs[i].y)<14){killPlayer();return;}
      }
      for(let i=6;i<p.segs.length;i+=2){
        if(Math.hypot(ai.x-p.segs[i].x,ai.y-p.segs[i].y)<12){killAI(ai);break;}
      }
    }
  }

  eat();

  G.particles=G.particles.filter(pk=>{pk.life-=dt;pk.x+=pk.vx*dt*.06;pk.y+=pk.vy*dt*.06;return pk.life>0;});
  G.coins.forEach(c=>c.bob+=dt*.003);
  G.pups.forEach(u=>{u.bob+=dt*.0025;u.rot+=dt*.0008;});
  G.food.forEach(f=>f.bob+=dt*.003);

  if(G.food.length<240)spawnFood();
  if(Math.random()<.008)spawnCoin();
  if(G.pups.length<5&&Math.random()<.004)spawnPU();

  G.cam.x+=(p.x-GC.width/2-G.cam.x)*.09;
  G.cam.y+=(p.y-GC.height/2-G.cam.y)*.09;
  G.cam.x=Math.max(0,Math.min(WW-GC.width,G.cam.x));
  G.cam.y=Math.max(0,Math.min(WH-GC.height,G.cam.y));

  G.score+=dt*.005;
  const rank=G.aiSnakes.filter(a=>!a.dead&&a.segs.length>p.segs.length).length+1;
  document.getElementById('sv').textContent=~~G.score;
  document.getElementById('cv').textContent=ST.coins;
  document.getElementById('rv').textContent='#'+rank;

  track('survive',~~G.gameTime);
  track('length',~~(p.segs.length/3));
  track('score',~~G.score);
}

function moveSnake(s,spd){
  let da=s.targetAngle-s.angle;
  while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
  s.angle+=da*.13;
  s.x+=Math.cos(s.angle)*spd; s.y+=Math.sin(s.angle)*spd;
  s.x=Math.max(0,Math.min(WW,s.x)); s.y=Math.max(0,Math.min(WH,s.y));
  s.segs.unshift({x:s.x,y:s.y});
  const cap=s.maxLen*3+10; if(s.segs.length>cap)s.segs.length=cap;
}

function thinkAI(ai){
  let best=null,bd=Infinity;
  G.food.forEach(f=>{const d=Math.hypot(ai.x-f.x,ai.y-f.y);if(d<bd){bd=d;best=f;}});
  G.coins.forEach(f=>{const d=Math.hypot(ai.x-f.x,ai.y-f.y)*.85;if(d<bd){bd=d;best=f;}});
  const dp=Math.hypot(ai.x-G.player.x,ai.y-G.player.y);
  if(dp<200&&G.player.segs.length>ai.segs.length){
    ai.targetAngle=Math.atan2(ai.y-G.player.y,ai.x-G.player.x)+(Math.random()-.5)*.7;
  } else if(best){
    ai.targetAngle=Math.atan2(best.y-ai.y,best.x-ai.x)+(Math.random()-.5)*.3;
  } else {
    ai.targetAngle+=(Math.random()-.5)*.5;
  }
  const M=160;
  if(ai.x<M)ai.targetAngle=0; if(ai.x>WW-M)ai.targetAngle=Math.PI;
  if(ai.y<M)ai.targetAngle=Math.PI/2; if(ai.y>WH-M)ai.targetAngle=-Math.PI/2;
}

function eat(){
  const p=G.player;
  const fr=G.puActive.magnet?130:36, cr=G.puActive.magnet?160:42;

  G.food=G.food.filter(f=>{
    if(Math.hypot(p.x-f.x,p.y-f.y)<fr){
      burst(f.x,f.y,f.col); p.maxLen+=1; G.score+=5;
      sfx('eat');
      ST.ach.pellets=(ST.ach.pellets||0)+1; track('pellets',ST.ach.pellets); return false;
    }
    return true;
  });
  G.aiSnakes.forEach(ai=>{
    if(ai.dead)return;
    G.food=G.food.filter(f=>{if(Math.hypot(ai.x-f.x,ai.y-f.y)<28){ai.maxLen+=1;return false;}return true;});
  });
  G.coins=G.coins.filter(c=>{
    if(Math.hypot(p.x-c.x,p.y-c.y)<cr){
      burst(c.x,c.y,'#ffe600');
      const e=1+~~(Math.random()*3); ST.coins+=e; G.score+=10;
      sfx('coin');
      ST.ach.totalCoins=(ST.ach.totalCoins||0)+e; track('totalCoins',ST.ach.totalCoins); return false;
    }
    return true;
  });
  G.pups=G.pups.filter(u=>{
    if(Math.hypot(p.x-u.x,p.y-u.y)<44){
      burst(u.x,u.y,u.color); G.puActive[u.type]=8000; setPUIco(u.type,true);
      toast(u.icon+' '+u.label+' ACTIVATED!',u.color); sfx('powerup');
      if(u.type==='speed'){ST.ach.speedPU=(ST.ach.speedPU||0)+1;track('speedPU',ST.ach.speedPU);}
      return false;
    }
    return true;
  });
}

function setPUIco(type,on){const el=document.getElementById('pu-'+type);if(el)on?el.classList.add('on'):el.classList.remove('on');}

function burst(x,y,col){
  for(let i=0;i<10;i++)G.particles.push({
    x,y,col,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,
    life:350+Math.random()*280,maxLife:630,
  });
}

function killPlayer(){
  if(!G||G.dead)return; G.dead=true;
  sfx('die'); stopMusic();
  G.player.segs.forEach((s,i)=>{if(i%3===0&&Math.random()<.35)spawnFoodAt(s.x,s.y);});
  cancelAnimationFrame(RAF);
  // screen flash
  GC.style.transition='opacity .15s'; GC.style.opacity='0.3';
  setTimeout(()=>{GC.style.opacity='1';},300);
  setTimeout(()=>endGame(~~G.score),1100);
}

function killAI(ai){
  if(!ai||ai.dead)return; ai.dead=true; sfx('kill');
  ai.segs.forEach((s,i)=>{if(i%3===0&&Math.random()<.35)spawnFoodAt(s.x,s.y);});
  G.score+=50; ST.ach.aiKills=(ST.ach.aiKills||0)+1; track('aiKills',ST.ach.aiKills);
  toast(ai.name+' ELIMINATED! +50','#ff0080');
  setTimeout(()=>{
    if(!G)return;
    const s2=ALL_SKINS[~~(Math.random()*ALL_SKINS.length)];
    const idx=G.aiSnakes.indexOf(ai);
    if(idx!==-1)G.aiSnakes[idx]=mkSnake(rnd(300,WW-300),rnd(300,WH-300),s2.c,rnd(6,14),false,AI_NAMES[~~(Math.random()*AI_NAMES.length)]);
  },4000);
}

function endGame(score){
  const earned=~~(score/10); ST.coins+=earned;
  if(score>ST.best)ST.best=score; save();
  hideGameOverlays();
  gx.clearRect(0,0,GC.width,GC.height);
  document.getElementById('go-score').textContent=score.toLocaleString();
  document.getElementById('go-best').textContent='BEST: '+ST.best.toLocaleString();
  document.getElementById('go-coins').textContent=earned;
  go('s-go'); G=null;
}

// ── RENDER ─────────────────────────────────────────────────────────
function render(){
  if(!G)return;
  const {cam,map}=G;
  gx.clearRect(0,0,GC.width,GC.height);

  // background
  gx.fillStyle=map.bg; gx.fillRect(0,0,GC.width,GC.height);

  // grid
  gx.strokeStyle=map.grid||'rgba(0,80,255,.06)'; gx.lineWidth=1;
  const gs=72,ox=cam.x%gs,oy=cam.y%gs;
  for(let x=-ox;x<GC.width+gs;x+=gs){gx.beginPath();gx.moveTo(x,0);gx.lineTo(x,GC.height);gx.stroke();}
  for(let y=-oy;y<GC.height+gs;y+=gs){gx.beginPath();gx.moveTo(0,y);gx.lineTo(GC.width,y);gx.stroke();}

  // world border
  const bx=-cam.x,by=-cam.y,wc=map.wall||'#0044ff';
  gx.save(); gx.shadowBlur=32; gx.shadowColor=wc; gx.strokeStyle=wc; gx.lineWidth=5;
  gx.strokeRect(bx+10,by+10,WW-20,WH-20);
  gx.lineWidth=1; gx.globalAlpha=.22; gx.strokeRect(bx+3,by+3,WW-6,WH-6);
  gx.restore();

  // food
  G.food.forEach(f=>{
    const sx=f.x-cam.x,sy=f.y-cam.y+Math.sin(f.bob)*3;
    if(sx<-20||sx>GC.width+20||sy<-20||sy>GC.height+20)return;
    gx.save(); gx.shadowBlur=10+Math.sin(f.bob)*4; gx.shadowColor=f.col;
    gx.fillStyle=f.col; gx.beginPath(); gx.arc(sx,sy,f.r,0,Math.PI*2); gx.fill();
    gx.globalAlpha=.2; gx.beginPath(); gx.arc(sx,sy,f.r*2.2,0,Math.PI*2); gx.fill();
    gx.restore();
  });

  // coins
  G.coins.forEach(c=>{
    const sx=c.x-cam.x,sy=c.y-cam.y+Math.sin(c.bob)*5;
    if(sx<-20||sx>GC.width+20||sy<-20||sy>GC.height+20)return;
    gx.save(); gx.shadowBlur=18; gx.shadowColor='#ffe600';
    gx.fillStyle='#ffe600'; gx.beginPath(); gx.arc(sx,sy,7,0,Math.PI*2); gx.fill();
    gx.globalAlpha=.25; gx.beginPath(); gx.arc(sx,sy,12,0,Math.PI*2); gx.fill();
    gx.globalAlpha=.7; gx.strokeStyle='rgba(255,255,255,.5)'; gx.lineWidth=1;
    gx.beginPath(); gx.arc(sx,sy,7,0,Math.PI*2); gx.stroke();
    gx.restore();
  });

  // power-ups
  G.pups.forEach(u=>{
    const sx=u.x-cam.x,sy=u.y-cam.y+Math.sin(u.bob)*7;
    if(sx<-40||sx>GC.width+40||sy<-40||sy>GC.height+40)return;
    gx.save(); gx.translate(sx,sy); gx.rotate(u.rot);
    gx.shadowBlur=24; gx.shadowColor=u.color;
    gx.fillStyle=u.color; gx.globalAlpha=.86;
    rrect(gx,-18,-18,36,36,8); gx.fill();
    gx.globalAlpha=.16; gx.beginPath(); gx.arc(0,0,28,0,Math.PI*2); gx.fill();
    gx.globalAlpha=.78; gx.strokeStyle=u.color; gx.lineWidth=2;
    rrect(gx,-18,-18,36,36,8); gx.stroke();
    gx.globalAlpha=1; gx.shadowBlur=0;
    gx.font='17px Arial'; gx.textAlign='center'; gx.textBaseline='middle';
    gx.fillStyle='#fff'; gx.fillText(u.icon,0,1);
    gx.restore();
  });

  // particles
  G.particles.forEach(pk=>{
    const sx=pk.x-cam.x,sy=pk.y-cam.y,a=pk.life/pk.maxLife;
    gx.save(); gx.globalAlpha=a*.92; gx.fillStyle=pk.col;
    gx.shadowBlur=8; gx.shadowColor=pk.col;
    gx.beginPath(); gx.arc(sx,sy,3.5*a,0,Math.PI*2); gx.fill();
    gx.restore();
  });

  // snakes
  [...G.aiSnakes,G.player].forEach(s=>drawSnake(s,cam));

  // minimap
  drawMM();

  // pause overlay when paused (game is frozen but render static frame)
  if(PAUSED){
    gx.save();
    gx.fillStyle='rgba(0,8,18,.55)'; gx.fillRect(0,0,GC.width,GC.height);
    gx.font='bold 28px Orbitron,monospace'; gx.textAlign='center'; gx.fillStyle='#00e5ff';
    gx.shadowBlur=20; gx.shadowColor='#00e5ff';
    gx.fillText('PAUSED',GC.width/2,GC.height/2);
    gx.restore();
  }
}

function drawSnake(s,cam){
  if(s.dead||s.segs.length<2)return;
  const maxR=s.isPlayer?13:11,minR=s.isPlayer?7:6;

  for(let i=s.segs.length-1;i>=0;i--){
    const seg=s.segs[i];
    const sx=seg.x-cam.x,sy=seg.y-cam.y;
    if(sx<-30||sx>GC.width+30||sy<-30||sy>GC.height+30)continue;
    const t=i/s.segs.length;
    const r=maxR-(maxR-minR)*t;
    const al=0.18+0.82*(1-t);
    const col=lerpHex(s.cols[0],s.cols[s.cols.length-1],t);

    if(i===0){
      gx.save();
      // outer glow layers
      gx.shadowBlur=28; gx.shadowColor=s.cols[0];
      gx.fillStyle=col; gx.globalAlpha=.14; gx.beginPath(); gx.arc(sx,sy,r*2.3,0,Math.PI*2); gx.fill();
      gx.globalAlpha=.28; gx.beginPath(); gx.arc(sx,sy,r*1.5,0,Math.PI*2); gx.fill();
      gx.shadowBlur=16; gx.globalAlpha=al;
      gx.beginPath(); gx.arc(sx,sy,r,0,Math.PI*2); gx.fill();
      gx.restore();

      // sheen highlight
      gx.save();
      const shi=gx.createRadialGradient(sx-r*.3,sy-r*.3,0,sx,sy,r);
      shi.addColorStop(0,'rgba(255,255,255,.35)'); shi.addColorStop(1,'rgba(255,255,255,0)');
      gx.fillStyle=shi; gx.beginPath(); gx.arc(sx,sy,r,0,Math.PI*2); gx.fill();
      gx.restore();

      // eyes
      const ang=s.angle,er=r*.42;
      const ex1=sx+Math.cos(ang)*r*.5+Math.sin(ang)*er;
      const ey1=sy+Math.sin(ang)*r*.5-Math.cos(ang)*er;
      const ex2=sx+Math.cos(ang)*r*.5-Math.sin(ang)*er;
      const ey2=sy+Math.sin(ang)*r*.5+Math.cos(ang)*er;
      gx.globalAlpha=1;
      gx.fillStyle='#fff'; gx.beginPath(); gx.arc(ex1,ey1,3,0,Math.PI*2); gx.fill();
      gx.fillStyle='#111'; gx.beginPath(); gx.arc(ex1+Math.cos(ang)*.9,ey1+Math.sin(ang)*.9,1.5,0,Math.PI*2); gx.fill();
      gx.fillStyle='#fff'; gx.beginPath(); gx.arc(ex2,ey2,3,0,Math.PI*2); gx.fill();
      gx.fillStyle='#111'; gx.beginPath(); gx.arc(ex2+Math.cos(ang)*.9,ey2+Math.sin(ang)*.9,1.5,0,Math.PI*2); gx.fill();

    } else {
      gx.globalAlpha=al;
      gx.fillStyle=col;
      gx.beginPath(); gx.arc(sx,sy,r,0,Math.PI*2); gx.fill();
    }
  }
  gx.globalAlpha=1;

  // AI name tag
  if(!s.isPlayer&&s.name){
    const sx=s.x-cam.x,sy=s.y-cam.y-20;
    if(sx>-60&&sx<GC.width+60&&sy>-30&&sy<GC.height+30){
      gx.save(); gx.font='bold 9px Orbitron,monospace'; gx.textAlign='center';
      gx.fillStyle='rgba(255,255,255,.72)'; gx.shadowBlur=5; gx.shadowColor='#000';
      gx.fillText(s.name,sx,sy); gx.restore();
    }
  }
}

function drawMM(){
  if(!G)return;
  const sc=78/WW;
  mx.clearRect(0,0,78,78); mx.fillStyle='rgba(0,0,0,.72)'; mx.fillRect(0,0,78,78);
  mx.fillStyle='#00ff8822'; G.food.forEach(f=>mx.fillRect(f.x*sc-1,f.y*sc-1,2,2));
  mx.fillStyle='#ffe60044'; G.coins.forEach(c=>mx.fillRect(c.x*sc-1,c.y*sc-1,2,2));
  G.aiSnakes.forEach(a=>{if(a.dead)return;mx.fillStyle=a.cols[0];mx.fillRect(a.x*sc-2,a.y*sc-2,4,4);});
  mx.save(); mx.shadowBlur=7; mx.shadowColor=G.player.cols[0]; mx.fillStyle=G.player.cols[0];
  mx.fillRect(G.player.x*sc-3,G.player.y*sc-3,6,6); mx.restore();
  mx.strokeStyle='rgba(0,229,255,.22)'; mx.lineWidth=1; mx.strokeRect(0,0,78,78);
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function lerpHex(a,b,t){
  const ca=parseInt(a.replace('#',''),16),cb=parseInt(b.replace('#',''),16);
  const ar=(ca>>16)&255,ag=(ca>>8)&255,ab_=ca&255;
  const br=(cb>>16)&255,bg=(cb>>8)&255,bb=cb&255;
  const r=~~(ar+(br-ar)*t),g=~~(ag+(bg-ag)*t),bl=~~(ab_+(bb-ab_)*t);
  return '#'+((r<<16)|(g<<8)|bl).toString(16).padStart(6,'0');
}
